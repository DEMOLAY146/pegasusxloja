<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pegasus Representações - Cigarros, Sedas, Piteiras e Fumos Premium">
    
    <!-- Visualização do link no WhatsApp -->
    <meta property="og:title" content="PEGASUS REPRESENTAÇÕES">
    <meta property="og:description" content="Cigarros, Sedas, Piteiras, Fumos e Acessórios">
    <meta property="og:image" content="https://i.ibb.co/3ygz6rym/Mpgt-B-removebg-preview.png">
    <meta property="og:url" content="https://SEUUSUARIO.github.io/pegasus-representacoes">
    <meta property="og:type" content="website">

    <title>PEGASUS REPRESENTAÇÕES</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://i.ibb.co/KxncsGgR/ZMUGd.jpg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        .product-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-img {
            height: 200px;
            object-fit: contain;
            background: transparent;
            padding: 15px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
            cursor: zoom-in;
            transition: transform 0.3s;
        }
        .product-img:hover {
            transform: scale(1.05);
        }
        .logo-img {
            width: 55px;
            height: 55px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-black border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <img src="https://i.ibb.co/KxncsGgR/ZMUGd.jpg" alt="Logo" class="logo-img rounded-2xl border border-[#d4af77]" onclick="openAdmin()">
                    <div>
                        <h1 class="text-2xl font-bold text-[#d4af77]">PEGASUS</h1>
                        <p class="text-[10px] text-zinc-400 -mt-1">REPRESENTAÇÕES</p>
                    </div>
                </div>
                
                <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl relative">
                    <i class="fa-solid fa-shopping-cart text-xl"></i>
                    <span class="text-sm">Carrinho</span>
                    <div id="cart-count" class="bg-[#d4af77] text-black font-bold w-5 h-5 text-xs rounded-full flex items-center justify-center absolute -top-1 -right-1">0</div>
                </button>
            </div>
        </div>

        <!-- CATEGORIAS -->
        <div class="bg-zinc-900 px-4 py-3 flex gap-2 overflow-x-auto border-t border-zinc-800">
            <button onclick="selectCategory('all')" id="cat-all" class="category-btn active whitespace-nowrap px-6 py-2.5 bg-[#d4af77] text-black font-semibold rounded-3xl text-sm">TODOS</button>
            <button onclick="selectCategory('CIGARROS')" id="cat-CIGARROS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">CIGARROS</button>
            <button onclick="selectCategory('SEDAS')" id="cat-SEDAS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">SEDAS E PITEIRAS</button>
            <button onclick="selectCategory('FUMOS')" id="cat-FUMOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">FUMOS</button>
            <button onclick="selectCategory('ACESSORIOS')" id="cat-ACESSORIOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">ACESSÓRIOS</button>
        </div>
    </header>

    <!-- Busca -->
    <div class="max-w-7xl mx-auto px-4 pt-5">
        <div class="relative">
            <input id="search-input" type="text" placeholder="🔎 Buscar..." 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-4 px-8 pl-12 text-base"
                   onkeyup="if(event.key === 'Enter') filterProducts()">
            <i onclick="filterProducts()" class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-[#d4af77]"></i>
        </div>
    </div>

    <!-- Produtos -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="products-container" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Modal de Zoom -->
    <div id="zoom-modal" onclick="closeZoom()">
        <img id="zoom-image" src="" onclick="event.stopImmediatePropagation(); closeZoom()">
    </div>

    <!-- Carrinho Modal -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-end">
        <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[90vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold">Seu Carrinho</h2>
                <button onclick="toggleCart()" class="text-3xl text-zinc-400">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-auto p-5 space-y-4"></div>
            
            <div class="p-5 border-t">
                <div class="flex justify-between text-xl mb-5">
                    <span>Total:</span>
                    <span id="cart-total" class="font-bold text-[#d4af77]">R$ 0,00</span>
                </div>
                <button onclick="finalizeOrder()" 
                        class="w-full py-5 bg-green-600 hover:bg-green-500 rounded-3xl text-lg font-semibold flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i>
                    FINALIZAR NO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- RODAPÉ -->
    <footer class="bg-black py-8 text-center">
        <a href="https://wa.me/5527995065360" target="_blank"
           class="inline-flex items-center gap-3 bg-green-500 hover:bg-green-600 text-white px-8 py-5 rounded-3xl text-lg font-medium shadow-xl">
            <i class="fa-brands fa-whatsapp text-3xl"></i>
            FALAR COM O VENDEDOR
        </a>
    </footer>

    <!-- ====================== PÁGINA ADMIN ====================== -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[500] overflow-auto p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-[#d4af77]">Painel Administrativo</h2>
                <button onclick="closeAdmin()" class="text-4xl text-red-500 hover:text-red-400">✕</button>
            </div>

            <!-- Cadastro de Novo Produto -->
            <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                <h3 class="text-xl font-semibold mb-4">Cadastrar Novo Produto</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="new-name" placeholder="Nome do produto" class="bg-zinc-800 px-4 py-3 rounded-2xl">
                    <input id="new-img" placeholder="URL da imagem" class="bg-zinc-800 px-4 py-3 rounded-2xl">
                    <input id="new-price" type="number" placeholder="Preço" class="bg-zinc-800 px-4 py-3 rounded-2xl">
                    <select id="new-category" class="bg-zinc-800 px-4 py-3 rounded-2xl">
                        <option value="CIGARROS">Cigarros</option>
                        <option value="SEDAS">Sedas e Piteiras</option>
                        <option value="FUMOS">Fumos</option>
                        <option value="ACESSORIOS">Acessórios</option>
                    </select>
                </div>
                <button onclick="addNewProduct()" class="mt-4 w-full py-4 bg-green-600 hover:bg-green-500 rounded-3xl font-semibold">
                    + CADASTRAR PRODUTO
                </button>
            </div>

            <!-- Lista de Produtos -->
            <div class="bg-zinc-900 rounded-3xl p-6">
                <h3 class="text-xl font-semibold mb-4">Produtos Existentes</h3>
                <div id="admin-products" class="space-y-4"></div>
            </div>

            <button onclick="saveAdminChanges()" 
                    class="mt-8 w-full py-5 bg-[#d4af77] hover:bg-amber-300 text-black font-bold rounded-3xl text-lg">
                💾 SALVAR TODAS AS ALTERAÇÕES
            </button>
        </div>
    </div>

    <script>
        let products = [
            // ... (todos os produtos da versão anterior - mantidos)
            { id: 1, name: "CAMEL AZUL (PC10)", category: "CIGARROS", price: 85, img: "https://i.ibb.co/PGPFZ8Mk/Whats-App-Image-2026-05-01-at-06-40-26-removebg-preview.png", active: true },
            // ... (inclua todos os outros produtos aqui - use a lista completa da versão anterior)
            // Para brevidade, estou omitindo a lista completa aqui, mas mantenha todos os produtos da última versão
        ]

        let cart = []
        let currentCategory = 'all'

        // Renderizar produtos na loja principal (apenas ativos)
        function renderProducts(filtered) {
            const container = document.getElementById('products-container')
            container.innerHTML = ''

            filtered.forEach(p => {
                if (!p.active) return
                const card = `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" onclick="zoomImage('${p.img}')">
                    <div class="p-3.5 flex-1 flex flex-col">
                        <h3 class="font-semibold text-base leading-tight">${p.name}</h3>
                        <p class="text-[#d4af77] text-2xl font-bold mt-1">R$ ${p.price},00</p>
                        <div class="mt-auto pt-4 flex gap-2">
                            <input type="number" id="qty-${p.id}" value="1" min="1" class="w-14 bg-zinc-800 text-center rounded-2xl text-base py-3 border border-zinc-700">
                            <button onclick="addToCart(${p.id})" class="flex-1 bg-[#d4af77] hover:bg-amber-300 text-zinc-950 font-semibold rounded-2xl text-sm py-3">
                                ADICIONAR
                            </button>
                        </div>
                    </div>
                </div>`
                container.innerHTML += card
            })
        }

        // Zoom
        function zoomImage(src) {
            document.getElementById('zoom-image').src = src
            document.getElementById('zoom-modal').style.display = 'flex'
        }

        function closeZoom() {
            document.getElementById('zoom-modal').style.display = 'none'
        }

        // ==================== ADMIN ====================
        function openAdmin() {
            const senha = prompt("Digite a senha de administrador:")
            if (senha === "demolay146") {
                document.getElementById('admin-panel').classList.remove('hidden')
                renderAdminProducts()
            } else {
                alert("Senha incorreta!")
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden')
        }

        function renderAdminProducts() {
            const container = document.getElementById('admin-products')
            container.innerHTML = ''

            products.forEach(p => {
                const div = document.createElement('div')
                div.className = "flex items-center gap-4 bg-zinc-800 p-4 rounded-2xl"
                div.innerHTML = `
                    <img src="${p.img}" class="w-16 h-16 object-contain">
                    <div class="flex-1">
                        <p class="font-medium">${p.name}</p>
                        <p class="text-sm text-zinc-400">${p.category}</p>
                    </div>
                    <input type="number" value="${p.price}" onchange="updatePrice(${p.id}, this.value)" 
                           class="w-24 bg-zinc-900 text-center py-2 rounded-xl">
                    <button onclick="toggleProduct(${p.id})" 
                            class="px-6 py-2 rounded-3xl text-sm font-medium ${p.active ? 'bg-green-600' : 'bg-red-600'}">
                        ${p.active ? 'ATIVO' : 'INATIVO'}
                    </button>
                `
                container.appendChild(div)
            })
        }

        function updatePrice(id, newPrice) {
            const product = products.find(p => p.id === id)
            if (product) product.price = parseFloat(newPrice)
        }

        function toggleProduct(id) {
            const product = products.find(p => p.id === id)
            if (product) product.active = !product.active
            renderAdminProducts()
        }

        function addNewProduct() {
            const name = document.getElementById('new-name').value.trim()
            const img = document.getElementById('new-img').value.trim()
            const price = parseFloat(document.getElementById('new-price').value)
            const category = document.getElementById('new-category').value

            if (!name || !img || !price) {
                alert("Preencha todos os campos!")
                return
            }

            const newId = Math.max(...products.map(p => p.id)) + 1

            products.push({
                id: newId,
                name: name,
                category: category,
                price: price,
                img: img,
                active: true
            })

            alert("Produto cadastrado com sucesso!")
            renderAdminProducts()

            // Limpa campos
            document.getElementById('new-name').value = ''
            document.getElementById('new-img').value = ''
            document.getElementById('new-price').value = ''
        }

        function saveAdminChanges() {
            localStorage.setItem('pegasus_products', JSON.stringify(products))
            alert("✅ Todas as alterações foram salvas!")
            closeAdmin()
            renderProducts(products) // atualiza a loja
        }

        // ... (funções de carrinho, addToCart, finalizeOrder etc. permanecem iguais)

        window.onload = () => {
            const saved = localStorage.getItem('pegasus_products')
            if (saved) {
                products = JSON.parse(saved)
            }
            renderProducts(products)
            updateCartCount()
        }
    </script>
</body>
</html>
