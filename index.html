        let cart = []
        let currentCategory = 'all'

        function renderProducts(filtered) {
            const container = document.getElementById('products-container')
            container.innerHTML = ''

            filtered.forEach(p => {
                if (!p.active) return // não mostra produtos desativados

                const card = `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" onclick="zoomImage('${p.img}')">
                    <div class="p-3.5 flex-1 flex flex-col">
                        <h3 class="font-semibold text-base leading-tight">${p.name}</h3>
                        <p class="text-[#d4af77] text-2xl font-bold mt-1">R$ ${p.price},00</p>
                        
                        <div class="mt-auto pt-4 flex gap-2">
                            <input type="number" id="qty-${p.id}" value="1" min="1" 
                                   class="w-14 bg-zinc-800 text-center rounded-2xl text-base py-3 border border-zinc-700">
                            <button onclick="addToCart(${p.id})" 
                                    class="flex-1 bg-[#d4af77] hover:bg-amber-300 text-zinc-950 font-semibold rounded-2xl text-sm py-3">
                                ADICIONAR
                            </button>
                        </div>
                    </div>
                </div>`
                container.innerHTML += card
            })
        }

        function zoomImage(src) {
            const modal = document.getElementById('zoom-modal')
            document.getElementById('zoom-image').src = src
            modal.style.display = 'flex'
        }

        function closeZoom() {
            document.getElementById('zoom-modal').style.display = 'none'
        }

        // ==================== ADMIN ====================
        function openAdmin() {
            const senha = prompt("Digite a senha de administrador:")
            if (senha === "demolay146") {
                document.getElementById('admin-panel').classList.remove('hidden')
                renderAdminProducts()
            } else {
                alert("Senha incorreta!")
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden')
        }

        function renderAdminProducts() {
            const tbody = document.getElementById('admin-products')
            tbody.innerHTML = ''

            products.forEach(p => {
                const tr = document.createElement('tr')
                tr.className = "border-b border-zinc-700"
                tr.innerHTML = `
                    <td class="py-4">${p.name}</td>
                    <td class="py-4">R$ ${p.price},00</td>
                    <td class="py-4 text-center">
                        <button onclick="toggleProduct(${p.id})" 
                                class="px-5 py-2 rounded-3xl text-sm font-medium ${p.active ? 'bg-green-600' : 'bg-red-600'}">
                            ${p.active ? 'ATIVO' : 'INATIVO'}
                        </button>
                    </td>
                `
                tbody.appendChild(tr)
            })
        }

        function toggleProduct(id) {
            const product = products.find(p => p.id === id)
            if (product) product.active = !product.active
            renderAdminProducts()
        }

        function saveAdminChanges() {
            localStorage.setItem('pegasus_products', JSON.stringify(products))
            alert("✅ Alterações salvas com sucesso!")
            closeAdmin()
            renderProducts(products) // atualiza a loja principal
        }

        // ==================== OUTRAS FUNÇÕES ====================
        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase()
            let filtered = products.filter(p => 
                p.active && 
                (currentCategory === 'all' || p.category === currentCategory) &&
                p.name.toLowerCase().includes(term)
            )
            renderProducts(filtered)
        }

        function selectCategory(cat) {
            currentCategory = cat
            document.querySelectorAll('.category-btn').forEach(btn => {
                const isActive = (cat === 'all' && btn.id === 'cat-all') || btn.id === `cat-${cat}`
                btn.classList.toggle('active', isActive)
                btn.classList.toggle('bg-[#d4af77]', isActive)
                btn.classList.toggle('text-black', isActive)
            })
            filterProducts()
        }

        // ... (addToCart, cart functions, finalizeOrder, etc. permanecem iguais)

        function addToCart(id) {
            const product = products.find(p => p.id === id)
            if (!product || !product.active) return
            // resto da função igual...
        }

        // (O restante do código do carrinho e finalizeOrder fica igual à versão anterior)

        window.onload = () => {
            // Carrega alterações salvas
            const saved = localStorage.getItem('pegasus_products')
            if (saved) {
                const savedProducts = JSON.parse(saved)
                products.forEach((p, i) => {
                    const savedP = savedProducts.find(sp => sp.id === p.id)
                    if (savedP) p.active = savedP.active
                })
            }
            renderProducts(products)
            updateCartCount()
        }
