<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGASUS REPRESENTAÇÕES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://i.ibb.co/KxncsGgR/ZMUGd.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        .product-card { height: 100%; display: flex; flex-direction: column; }
        .product-img { height: 200px; object-fit: contain; background: transparent; padding: 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); cursor: zoom-in; }
        .logo-img { width: 55px; height: 55px; cursor: pointer; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-black border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <img src="https://i.ibb.co/KxncsGgR/ZMUGd.jpg" alt="Logo" class="logo-img rounded-2xl border border-[#d4af77]" onclick="openAdmin()">
                    <div>
                        <h1 class="text-2xl font-bold text-[#d4af77]">PEGASUS</h1>
                        <p class="text-[10px] text-zinc-400 -mt-1">REPRESENTAÇÕES</p>
                    </div>
                </div>
                <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl relative">
                    <i class="fa-solid fa-shopping-cart text-xl"></i>
                    <span class="text-sm">Carrinho</span>
                    <div id="cart-count" class="bg-[#d4af77] text-black font-bold w-5 h-5 text-xs rounded-full flex items-center justify-center absolute -top-1 -right-1">0</div>
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 px-4 py-3 flex gap-2 overflow-x-auto border-t border-zinc-800">
            <button onclick="selectCategory('all')" id="cat-all" class="category-btn active whitespace-nowrap px-6 py-2.5 bg-[#d4af77] text-black font-semibold rounded-3xl text-sm">TODOS</button>
            <button onclick="selectCategory('CIGARROS')" id="cat-CIGARROS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">CIGARROS</button>
            <button onclick="selectCategory('SEDAS')" id="cat-SEDAS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">SEDAS E PITEIRAS</button>
            <button onclick="selectCategory('FUMOS')" id="cat-FUMOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">FUMOS</button>
            <button onclick="selectCategory('ACESSORIOS')" id="cat-ACESSORIOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">ACESSÓRIOS</button>
        </div>
    </header>

    <!-- Busca e Produtos (mantidos) -->
    <div class="max-w-7xl mx-auto px-4 pt-5">
        <div class="relative">
            <input id="search-input" type="text" placeholder="🔎 Buscar..." class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-4 px-8 pl-12 text-base" onkeyup="if(event.key === 'Enter') filterProducts()">
            <i onclick="filterProducts()" class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-[#d4af77]"></i>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="products-container" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Zoom -->
    <div id="zoom-modal" onclick="closeZoom()" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center">
        <img id="zoom-image" src="" onclick="event.stopImmediatePropagation(); closeZoom()" class="max-w-[90%] max-h-[90%] object-contain">
    </div>

    <!-- Carrinho -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-end">
        <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[90vh] flex flex-col">
            <div class="p-5 border-b flex justify-between">
                <h2 class="text-xl font-semibold">Seu Carrinho</h2>
                <button onclick="toggleCart()" class="text-3xl text-zinc-400">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-auto p-5 space-y-4"></div>
            <div class="p-5 border-t">
                <div class="flex justify-between text-xl mb-5">
                    <span>Total:</span>
                    <span id="cart-total" class="font-bold text-[#d4af77]">R$ 0,00</span>
                </div>
                <button onclick="finalizeOrder()" class="w-full py-5 bg-green-600 hover:bg-green-500 rounded-3xl text-lg font-semibold flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> FINALIZAR NO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- RODAPÉ -->
    <footer class="bg-black py-8 text-center">
        <a href="https://wa.me/5527995065360" target="_blank" class="inline-flex items-center gap-3 bg-green-500 hover:bg-green-600 text-white px-8 py-5 rounded-3xl text-lg font-medium shadow-xl">
            <i class="fa-brands fa-whatsapp text-3xl"></i> FALAR COM O VENDEDOR
        </a>
    </footer>

    <!-- ====================== PAINEL ADMIN ====================== -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[500] overflow-auto">
        <div class="max-w-6xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-[#d4af77]">Painel Administrativo</h2>
                <button onclick="closeAdmin()" class="text-4xl text-red-500">✕</button>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-10">
                <div onclick="showAdminSection('products-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center transition">
                    <i class="fa-solid fa-box text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Produtos</p>
                </div>
                <div onclick="showAdminSection('sales-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center transition">
                    <i class="fa-solid fa-chart-bar text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Relatórios de Vendas</p>
                </div>
            </div>

            <!-- ====================== PRODUTOS ====================== -->
            <div id="products-section" class="admin-section active">
                <!-- Cadastrar Categoria -->
                <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4">Gerenciar Categorias</h3>
                    <div class="flex gap-3 mb-4">
                        <input id="new-category-name" placeholder="Nome da nova categoria" class="flex-1 bg-zinc-800 p-4 rounded-2xl">
                        <button onclick="addNewCategory()" class="bg-green-600 hover:bg-green-500 px-8 rounded-2xl font-semibold">Cadastrar Categoria</button>
                    </div>
                    <div id="categories-list" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Cadastrar Novo Produto -->
                <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4">Cadastrar Novo Produto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <input id="new-name" placeholder="Nome" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-img" placeholder="URL da imagem" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-cost" type="number" placeholder="Preço de Custo" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-price" type="number" placeholder="Preço de Venda" class="bg-zinc-800 p-4 rounded-2xl">
                        <select id="new-category" class="bg-zinc-800 p-4 rounded-2xl"></select>
                    </div>
                    <button onclick="addNewProduct()" class="mt-4 w-full bg-green-600 hover:bg-green-500 py-4 rounded-3xl font-semibold">+ CADASTRAR PRODUTO</button>
                </div>

                <!-- Gerenciar Produtos -->
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Gerenciar Produtos</h3>
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-zinc-700">
                                <th class="py-3">Produto</th>
                                <th class="py-3">Custo</th>
                                <th class="py-3">Venda</th>
                                <th class="py-3 text-center">Status</th>
                                <th class="py-3 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <!-- ====================== RELATÓRIOS ====================== -->
            <div id="sales-section" class="admin-section">
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Relatórios de Vendas</h3>
                    <div class="flex gap-4 mb-6">
                        <select id="period-filter" class="bg-zinc-800 p-3 rounded-2xl">
                            <option value="all">Todos os pedidos</option>
                            <option value="day">Hoje</option>
                            <option value="month">Este Mês</option>
                            <option value="year">Este Ano</option>
                        </select>
                        <button onclick="renderSales()" class="bg-green-600 px-6 py-3 rounded-2xl font-medium">Gerar Relatório</button>
                        <button onclick="exportToPDF()" class="bg-blue-600 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                            <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                        </button>
                    </div>

                    <table class="w-full text-left bg-zinc-800 rounded-2xl overflow-hidden">
                        <thead>
                            <tr class="bg-zinc-700">
                                <th class="p-4">Produto</th>
                                <th class="p-4 text-center">Qtd Vendida</th>
                                <th class="p-4 text-center">Custo Total</th>
                                <th class="p-4 text-center">Lucro</th>
                            </tr>
                        </thead>
                        <tbody id="report-table" class="text-sm"></tbody>
                    </table>

                    <div id="report-summary" class="mt-6 text-xl font-semibold flex justify-between bg-zinc-800 p-6 rounded-2xl"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [ /* seus produtos com costPrice */ ];
        let cart = [];
        let currentCategory = 'all';
        let orders = [];
        let categories = ["CIGARROS", "SEDAS", "FUMOS", "ACESSORIOS"];

        // Carrega dados salvos
        window.onload = () => {
            const savedProducts = localStorage.getItem('pegasus_products');
            if (savedProducts) products = JSON.parse(savedProducts);
            const savedOrders = localStorage.getItem('pegasus_orders');
            if (savedOrders) orders = JSON.parse(savedOrders);
            const savedCategories = localStorage.getItem('pegasus_categories');
            if (savedCategories) categories = JSON.parse(savedCategories);

            renderProducts(products);
            updateCartCount();
        };

        // Funções da loja (carrinho, zoom, etc.) permanecem iguais
        function renderProducts(filtered) { /* ... */ }
        function addToCart(id) { /* ... */ }
        function finalizeOrder() { /* ... */ }
        function toggleCart() { /* ... */ }

        // ====================== ADMIN ======================
        function openAdmin() {
            const senha = prompt("Digite a senha de administrador:");
            if (senha === "demolay146") {
                document.getElementById('admin-panel').classList.remove('hidden');
                showAdminSection('products-section');
            } else alert("Senha incorreta!");
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        function showAdminSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            if (section === 'products-section') {
                renderAdminProducts();
                renderCategoriesList();
            }
            if (section === 'sales-section') renderSales();
        }

        // ====================== CATEGORIAS ======================
        function renderCategoriesList() {
            const container = document.getElementById('categories-list');
            container.innerHTML = '';
            categories.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = "bg-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-3";
                div.innerHTML = `
                    <span>${cat}</span>
                    <button onclick="deleteCategory(${index})" class="text-red-500 hover:text-red-400 text-sm">Excluir</button>
                `;
                container.appendChild(div);
            });
        }

        function addNewCategory() {
            const name = document.getElementById('new-category-name').value.trim().toUpperCase();
            if (!name) return alert("Digite o nome da categoria!");
            if (categories.includes(name)) return alert("Essa categoria já existe!");

            categories.push(name);
            localStorage.setItem('pegasus_categories', JSON.stringify(categories));
            renderCategoriesList();
            document.getElementById('new-category-name').value = '';
            updateCategoryDropdown();
        }

        function deleteCategory(index) {
            if (confirm("Excluir esta categoria?")) {
                categories.splice(index, 1);
                localStorage.setItem('pegasus_categories', JSON.stringify(categories));
                renderCategoriesList();
                updateCategoryDropdown();
            }
        }

        function updateCategoryDropdown() {
            const select = document.getElementById('new-category');
            select.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        // ====================== RELATÓRIOS ======================
        function renderSales() {
            const filter = document.getElementById('period-filter').value;
            const container = document.getElementById('report-table');
            container.innerHTML = '';

            let filteredOrders = orders;
            const now = new Date();

            if (filter === 'day') {
                filteredOrders = orders.filter(o => new Date(o.date).toDateString() === now.toDateString());
            } else if (filter === 'month') {
                filteredOrders = orders.filter(o => new Date(o.date).getMonth() === now.getMonth() && new Date(o.date).getFullYear() === now.getFullYear());
            } else if (filter === 'year') {
                filteredOrders = orders.filter(o => new Date(o.date).getFullYear() === now.getFullYear());
            }

            let totalQty = 0, totalCost = 0, totalProfit = 0;

            // Agrupar por produto
            const summary = {};
            filteredOrders.forEach(order => {
                order.items.forEach(item => {
                    const prod = products.find(p => p.id === item.id);
                    if (!prod) return;
                    if (!summary[item.name]) {
                        summary[item.name] = { qty: 0, cost: 0, revenue: 0 };
                    }
                    const qty = item.quantity;
                    summary[item.name].qty += qty;
                    summary[item.name].cost += (prod.costPrice * qty);
                    summary[item.name].revenue += (prod.price * qty);
                    totalQty += qty;
                });
            });

            Object.keys(summary).forEach(name => {
                const data = summary[name];
                const profit = data.revenue - data.cost;
                totalCost += data.cost;
                totalProfit += profit;

                container.innerHTML += `
                <tr class="border-b border-zinc-700">
                    <td class="p-4">${name}</td>
                    <td class="p-4 text-center">${data.qty}</td>
                    <td class="p-4 text-center">R$ ${data.cost.toFixed(2)}</td>
                    <td class="p-4 text-center text-green-500">R$ ${profit.toFixed(2)}</td>
                </tr>`;
            });

            document.getElementById('sales-summary').innerHTML = `
                <div class="grid grid-cols-3 gap-6 text-center">
                    <div><p class="text-sm text-zinc-400">Qtd Total Vendida</p><p class="text-2xl">${totalQty}</p></div>
                    <div><p class="text-sm text-zinc-400">Custo Total</p><p class="text-2xl">R$ ${totalCost.toFixed(2)}</p></div>
                    <div><p class="text-sm text-zinc-400">Lucro Total</p><p class="text-2xl text-green-500">R$ ${totalProfit.toFixed(2)}</p></div>
                </div>`;
        }

        function exportToPDF() {
            const original = document.getElementById('sales-section').innerHTML;
            document.getElementById('sales-section').innerHTML = `
                <h2 class="text-2xl font-bold mb-6">Relatório de Vendas - Pegasus Representações</h2>
                ${document.getElementById('sales-list').innerHTML}
                <div class="mt-10">${document.getElementById('sales-summary').innerHTML}</div>
            `;
            window.print();
            document.getElementById('sales-section').innerHTML = original;
        }

        function saveAdminChanges() {
            localStorage.setItem('pegasus_products', JSON.stringify(products));
            localStorage.setItem('pegasus_categories', JSON.stringify(categories));
            alert("✅ Alterações salvas permanentemente!");
            closeAdmin();
            renderProducts(products);
        }
    </script>
</body>
</html>
