<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGASUS REPRESENTAÇÕES</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="icon" href="https://i.ibb.co/KxncsGgR/ZMUGd.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        .product-card { height: 100%; display: flex; flex-direction: column; }
        .product-img { height: 200px; object-fit: contain; background: transparent; padding: 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); cursor: zoom-in; }
        .logo-img { width: 55px; height: 55px; cursor: pointer; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }

        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                max-width: 80mm;
                margin: 0 auto;
                font-family: monospace;
                font-size: 13px;
                line-height: 1.4;
                padding: 8mm 5mm;
                background: white;
                color: black;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-black border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <img src="https://i.ibb.co/KxncsGgR/ZMUGd.jpg" alt="Logo" class="logo-img rounded-2xl border border-[#d4af77]" onclick="openAdmin()">
                    <div>
                        <h1 class="text-2xl font-bold text-[#d4af77]">PEGASUS</h1>
                        <p class="text-[10px] text-zinc-400 -mt-1">REPRESENTAÇÕES</p>
                    </div>
                </div>
                <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl relative">
                    <i class="fa-solid fa-shopping-cart text-xl"></i>
                    <span class="text-sm">Carrinho</span>
                    <div id="cart-count" class="bg-[#d4af77] text-black font-bold w-5 h-5 text-xs rounded-full flex items-center justify-center absolute -top-1 -right-1">0</div>
                </button>
            </div>
        </div>
        <div class="bg-zinc-900 px-4 py-3 flex gap-2 overflow-x-auto border-t border-zinc-800">
            <button onclick="selectCategory('all')" id="cat-all" class="category-btn active whitespace-nowrap px-6 py-2.5 bg-[#d4af77] text-black font-semibold rounded-3xl text-sm">TODOS</button>
            <button onclick="selectCategory('CIGARROS')" id="cat-CIGARROS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">CIGARROS</button>
            <button onclick="selectCategory('SEDAS')" id="cat-SEDAS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">SEDAS E PITEIRAS</button>
            <button onclick="selectCategory('FUMOS')" id="cat-FUMOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">FUMOS</button>
            <button onclick="selectCategory('ACESSORIOS')" id="cat-ACESSORIOS" class="category-btn whitespace-nowrap px-6 py-2.5 hover:bg-zinc-800 rounded-3xl text-sm">ACESSÓRIOS</button>
        </div>
    </header>

    <!-- Busca -->
    <div class="max-w-7xl mx-auto px-4 pt-5">
        <div class="relative">
            <input id="search-input" type="text" placeholder="🔎 Buscar..." class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-4 px-8 pl-12 text-base" onkeyup="if(event.key === 'Enter') filterProducts()">
            <i onclick="filterProducts()" class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-[#d4af77]"></i>
        </div>
    </div>

    <!-- Produtos -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="products-container" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Zoom Modal -->
    <div id="zoom-modal" onclick="closeZoom()" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center">
        <img id="zoom-image" src="" onclick="event.stopImmediatePropagation(); closeZoom()" class="max-w-[90%] max-h-[90%] object-contain cursor-zoom-out">
    </div>

    <!-- Carrinho -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-end">
        <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[90vh] flex flex-col">
            <div class="p-5 border-b flex justify-between">
                <h2 class="text-xl font-semibold">Seu Carrinho</h2>
                <button onclick="toggleCart()" class="text-3xl text-zinc-400">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-auto p-5 space-y-4"></div>
            <div class="p-5 border-t">
                <div class="flex justify-between text-xl mb-5">
                    <span>Total:</span>
                    <span id="cart-total" class="font-bold text-[#d4af77]">R$ 0,00</span>
                </div>
                <button onclick="finalizeOrder()" class="w-full py-5 bg-green-600 hover:bg-green-500 rounded-3xl text-lg font-semibold flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> FINALIZAR NO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- RODAPÉ -->
    <footer class="bg-black py-8 text-center">
        <a href="https://wa.me/5527995065360" target="_blank" class="inline-flex items-center gap-3 bg-green-500 hover:bg-green-600 text-white px-8 py-5 rounded-3xl text-lg font-medium shadow-xl">
            <i class="fa-brands fa-whatsapp text-3xl"></i> FALAR COM O VENDEDOR
        </a>
    </footer>

    <!-- ====================== PAINEL ADMIN ====================== -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[500] overflow-auto">
        <div class="max-w-6xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-[#d4af77]">Painel Administrativo</h2>
                <button onclick="closeAdmin()" class="text-4xl text-red-500">✕</button>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-10">
                <div onclick="showAdminSection('products-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center transition">
                    <i class="fa-solid fa-box text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Produtos</p>
                </div>
                <div onclick="showAdminSection('sales-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center transition">
                    <i class="fa-solid fa-chart-bar text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Relatórios de Vendas</p>
                </div>
            </div>

            <!-- ==================== PRODUTOS ==================== -->
            <div id="products-section" class="admin-section active">
                <!-- Cadastrar Novo Produto -->
                <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4">Cadastrar Novo Produto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <input id="new-name" placeholder="Nome" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-img" placeholder="URL da imagem" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-cost" type="number" placeholder="Preço de Custo" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-price" type="number" placeholder="Preço de Venda" class="bg-zinc-800 p-4 rounded-2xl">
                        <select id="new-category" class="bg-zinc-800 p-4 rounded-2xl"></select>
                    </div>
                    <button onclick="addNewProduct()" class="mt-4 w-full bg-green-600 hover:bg-green-500 py-4 rounded-3xl font-semibold">+ CADASTRAR PRODUTO</button>
                </div>

                <!-- Gerenciar Categorias -->
                <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-tags"></i> Gerenciar Categorias
                    </h3>
                    <div class="flex gap-3">
                        <input id="new-category-input" placeholder="Nome da nova categoria (maiúsculas)" class="flex-1 bg-zinc-800 p-4 rounded-2xl text-base">
                        <button onclick="addNewCategory()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-3xl font-semibold">+ CADASTRAR</button>
                    </div>
                    <div id="categories-list" class="mt-6 flex flex-wrap gap-3"></div>
                </div>

                <!-- Gerenciar Produtos -->
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Gerenciar Produtos</h3>
                    <table class="w-full text-left">
                        <thead><tr class="border-b border-zinc-700">
                            <th class="py-3">Produto</th>
                            <th class="py-3">Custo</th>
                            <th class="py-3">Venda</th>
                            <th class="py-3 text-center">Status</th>
                            <th class="py-3 text-center">Ações</th>
                        </tr></thead>
                        <tbody id="admin-products" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <!-- ==================== RELATÓRIOS DE VENDAS ==================== -->
            <div id="sales-section" class="admin-section">
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-semibold">Relatórios de Vendas</h3>
                        <button onclick="generateDetailedReport()" class="flex items-center gap-2 bg-[#d4af77] hover:bg-amber-300 text-black px-6 py-3 rounded-3xl font-semibold">
                            <i class="fa-solid fa-file-chart-pie"></i> Gerar Relatório por Período
                        </button>
                    </div>

                    <!-- NOVO FILTRO COM CALENDÁRIO -->
                    <div class="flex flex-wrap gap-4 mb-6 items-end">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Filtro Rápido</label>
                            <select id="period-filter" class="bg-zinc-800 p-3 rounded-2xl">
                                <option value="all">Todos os pedidos</option>
                                <option value="day">Hoje</option>
                                <option value="month">Este Mês</option>
                                <option value="year">Este Ano</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Data Inicial</label>
                            <input type="date" id="start-date" class="bg-zinc-800 p-3 rounded-2xl text-white">
                        </div>

                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Data Final</label>
                            <input type="date" id="end-date" class="bg-zinc-800 p-3 rounded-2xl text-white">
                        </div>

                        <button onclick="renderSales()" class="bg-green-600 px-8 py-3 rounded-3xl font-semibold flex items-center gap-2">
                            <i class="fa-solid fa-filter"></i> ATIVAR FILTRO
                        </button>
                    </div>

                    <div id="sales-list" class="space-y-6"></div>
                </div>
            </div>

            <button onclick="saveAdminChanges()" class="mt-6 w-full py-5 bg-green-600 hover:bg-green-500 rounded-3xl text-lg font-semibold">💾 SALVAR TODAS AS ALTERAÇÕES</button>
        </div>
    </div>

    <!-- MODAL RELATÓRIO DETALHADO -->
    <div id="detailed-report-modal" onclick="if(event.target.id==='detailed-report-modal')closeDetailedReport()" class="hidden fixed inset-0 bg-black/95 z-[600] flex items-center justify-center">
        <div class="bg-zinc-900 w-full max-w-5xl mx-4 rounded-3xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-2xl font-bold text-[#d4af77]">Relatório Detalhado de Vendas por Período</h2>
                <div class="flex items-center gap-3">
                    <button onclick="exportReportToPDF()" class="flex items-center gap-2 bg-green-600 hover:bg-green-500 px-6 py-2 rounded-3xl text-sm font-medium">
                        <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                    </button>
                    <button onclick="closeDetailedReport()" class="text-4xl text-red-400">✕</button>
                </div>
            </div>
            <div class="p-6 max-h-[70vh] overflow-auto">
                <table id="detailed-report-table" class="w-full text-sm"></table>
            </div>
        </div>
    </div>

    <!-- ÁREA OCULTA PARA IMPRESSÃO TÉRMICA -->
    <div id="print-area" class="hidden"></div>

    <script>
        let products = [];
        let cart = [];
        let currentCategory = 'all';
        let orders = [];
        let categories = [];

        // ====================== FUNÇÕES DA LOJA ======================
        function renderProducts(filtered) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            filtered.forEach(p => {
                if (!p.active) return;
                container.innerHTML += `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" onclick="zoomImage('${p.img}')">
                    <div class="p-3.5 flex-1 flex flex-col">
                        <h3 class="font-semibold text-base leading-tight">${p.name}</h3>
                        <p class="text-[#d4af77] text-2xl font-bold mt-1">R$ ${p.price},00</p>
                        <div class="mt-auto pt-4 flex gap-2">
                            <input type="number" id="qty-${p.id}" value="1" min="1" class="w-14 bg-zinc-800 text-center rounded-2xl text-base py-3 border border-zinc-700">
                            <button onclick="addToCart(${p.id})" class="flex-1 bg-[#d4af77] hover:bg-amber-300 text-zinc-950 font-semibold rounded-2xl text-sm py-3">ADICIONAR</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function zoomImage(src) {
            document.getElementById('zoom-image').src = src;
            document.getElementById('zoom-modal').classList.remove('hidden');
        }
        function closeZoom() {
            document.getElementById('zoom-modal').classList.add('hidden');
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            let filtered = products.filter(p =>
                p.active && (currentCategory === 'all' || p.category === currentCategory) &&
                p.name.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        }

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                const isActive = (cat === 'all' && btn.id === 'cat-all') || btn.id === `cat-${cat}`;
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('bg-[#d4af77]', isActive);
                btn.classList.toggle('text-black', isActive);
            });
            filterProducts();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product || !product.active) return;
            const qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity += qty;
            else cart.push({ ...product, quantity: qty });
            updateCartCount();
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-zinc-400 py-12">Seu carrinho está vazio</p>`;
                document.getElementById('cart-total').textContent = 'R$ 0,00';
                return;
            }
            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                container.innerHTML += `
                <div class="flex gap-4 bg-zinc-800 rounded-2xl p-4">
                    <img src="${item.img}" class="w-16 h-16 object-contain rounded-xl">
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <h4 class="font-semibold">${item.name}</h4>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <p class="text-sm text-zinc-400">${item.quantity} × R$ ${item.price},00</p>
                        <p class="text-[#d4af77] font-bold">R$ ${itemTotal},00</p>
                    </div>
                </div>`;
            });
            document.getElementById('cart-total').textContent = `R$ ${total},00`;
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartCount();
            renderCart();
        }

        function finalizeOrder() {
            if (cart.length === 0) return;
            const customerName = prompt("Informe o Nome Completo do Cliente:");
            if (!customerName) return alert("Nome é obrigatório!");
            alert("ATENÇÃO!\n\nOS PREÇOS E ESTOQUE DA LOJA NÃO ESTÃO ATUALIZADOS!\n\nPARA NÃO TER CORTE NO PEDIDO CONFIRME COM O VENDEDOR");
            const order = {
                date: new Date().toLocaleString('pt-BR'),
                customer: customerName,
                items: JSON.parse(JSON.stringify(cart)),
                total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0)
            };
            orders.push(order);
            localStorage.setItem('pegasus_orders', JSON.stringify(orders));
            let msg = `🚀 *PEDIDO PEGASUS REPRESENTAÇÕES*\n\n`;
            msg += `Cliente: ${customerName}\n\n`;
            let total = 0;
            cart.forEach(item => {
                const sub = item.price * item.quantity;
                total += sub;
                msg += `${item.quantity}x ${item.name} → R$ ${sub},00\n`;
            });
            msg += `\n*TOTAL: R$ ${total},00*`;
            window.open(`https://wa.me/5527995065360?text=${encodeURIComponent(msg)}`, '_blank');
            cart = [];
            updateCartCount();
            toggleCart();
        }

        // ====================== ADMIN ======================
        function openAdmin() {
            const senha = prompt("Digite a senha de administrador:");
            if (senha === "demolay146") {
                document.getElementById('admin-panel').classList.remove('hidden');
                showAdminSection('products-section');
            } else {
                alert("Senha incorreta!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        function showAdminSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            if (section === 'products-section') {
                renderAdminProducts();
                renderCategories();
            }
            if (section === 'sales-section') renderSales();
        }

        // ====================== CATEGORIAS ======================
        function loadCategories() {
            const saved = localStorage.getItem('pegasus_categories');
            categories = saved ? JSON.parse(saved) : ["CIGARROS", "SEDAS", "FUMOS", "ACESSORIOS"];
        }

        function saveCategories() {
            localStorage.setItem('pegasus_categories', JSON.stringify(categories));
        }

        function renderCategories() {
            const container = document.getElementById('categories-list');
            container.innerHTML = '';
            categories.forEach((cat, i) => {
                container.innerHTML += `
                <div class="bg-zinc-800 text-white px-5 py-2 rounded-3xl flex items-center justify-between w-fit">
                    <span>${cat}</span>
                    <button onclick="deleteCategory(${i}); event.stopImmediatePropagation();" class="ml-3 text-red-400 hover:text-red-500">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>`;
            });
            populateCategorySelect();
        }

        function deleteCategory(index) {
            if (confirm("Excluir esta categoria? Produtos com ela ficarão sem categoria.")) {
                categories.splice(index, 1);
                saveCategories();
                renderCategories();
            }
        }

        function addNewCategory() {
            const input = document.getElementById('new-category-input');
            const name = input.value.trim().toUpperCase();
            if (!name) return;
            if (categories.includes(name)) {
                alert("Essa categoria já existe!");
                return;
            }
            categories.push(name);
            saveCategories();
            renderCategories();
            input.value = '';
        }

        function populateCategorySelect() {
            const select = document.getElementById('new-category');
            if (!select) return;
            select.innerHTML = '<option value="">Selecione...</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        // ====================== PRODUTOS ADMIN ======================
        function renderAdminProducts() {
            const tbody = document.getElementById('admin-products');
            tbody.innerHTML = '';
            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-zinc-700";
                tr.innerHTML = `
                    <td class="py-4">${p.name}</td>
                    <td class="py-4"><input type="number" value="${p.costPrice}" onchange="updateCostPrice(${p.id}, this.value)" class="bg-zinc-800 w-20 text-center rounded-xl p-2"></td>
                    <td class="py-4"><input type="number" value="${p.price}" onchange="updatePrice(${p.id}, this.value)" class="bg-zinc-800 w-20 text-center rounded-xl p-2"></td>
                    <td class="py-4 text-center">
                        <button onclick="toggleProduct(${p.id})" class="px-6 py-2 rounded-3xl text-sm font-medium ${p.active ? 'bg-green-600' : 'bg-red-600'}">
                            ${p.active ? '✅ ATIVO' : '❌ INATIVO'}
                        </button>
                    </td>
                    <td class="py-4 text-center">
                        <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteProduct(id) {
            if (confirm("Deseja realmente excluir este produto?")) {
                products = products.filter(p => p.id !== id);
                renderAdminProducts();
            }
        }

        function updateCostPrice(id, newCost) {
            const product = products.find(p => p.id === id);
            if (product) product.costPrice = parseFloat(newCost);
        }

        function updatePrice(id, newPrice) {
            const product = products.find(p => p.id === id);
            if (product) product.price = parseFloat(newPrice);
        }

        function toggleProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) product.active = !product.active;
            renderAdminProducts();
        }

        function addNewProduct() {
            const name = document.getElementById('new-name').value.trim();
            const img = document.getElementById('new-img').value.trim();
            const costPrice = parseFloat(document.getElementById('new-cost').value);
            const price = parseFloat(document.getElementById('new-price').value);
            const category = document.getElementById('new-category').value;

            if (!name || !img || isNaN(costPrice) || isNaN(price) || !category) {
                alert("Preencha todos os campos corretamente!");
                return;
            }

            const newId = Math.max(0, ...products.map(p => p.id)) + 1;
            products.push({ id: newId, name, category, costPrice, price, img, active: true });
            alert("Produto cadastrado com sucesso!");
            renderAdminProducts();
            document.getElementById('new-name').value = '';
            document.getElementById('new-img').value = '';
            document.getElementById('new-cost').value = '';
            document.getElementById('new-price').value = '';
        }

        // ====================== RELATÓRIOS - NOVO FILTRO COM CALENDÁRIO ======================
        function getFilteredOrders() {
            const quickFilter = document.getElementById('period-filter').value;
            const startStr = document.getElementById('start-date').value;   // YYYY-MM-DD
            const endStr   = document.getElementById('end-date').value;

            // Se o usuário preencheu as datas do calendário, usa o período personalizado
            if (startStr && endStr) {
                const start = new Date(startStr);
                const end   = new Date(endStr);
                end.setHours(23, 59, 59, 999); // inclui o dia final completo

                return orders.filter(order => {
                    const [datePart] = order.date.split(' ');
                    const [day, month, year] = datePart.split('/').map(Number);
                    const orderDate = new Date(year, month - 1, day);
                    return orderDate >= start && orderDate <= end;
                });
            }

            // Senão, usa o filtro rápido (todos, hoje, mês, ano)
            const now = new Date();
            return orders.filter(order => {
                const [datePart] = order.date.split(' ');
                const [day, month, year] = datePart.split('/').map(Number);
                const orderDate = new Date(year, month - 1, day);

                if (quickFilter === 'all') return true;
                if (quickFilter === 'day') return orderDate.toDateString() === now.toDateString();
                if (quickFilter === 'month') return orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                if (quickFilter === 'year') return orderDate.getFullYear() === now.getFullYear();
                return true;
            });
        }

        function renderSales() {
            const container = document.getElementById('sales-list');
            container.innerHTML = '';
            const filteredOrders = getFilteredOrders();

            if (filteredOrders.length === 0) {
                container.innerHTML = `<p class="text-zinc-400 text-center py-12">Nenhum pedido encontrado para o período selecionado.</p>`;
                return;
            }

            filteredOrders.forEach((order, globalIndex) => {
                const originalIndex = orders.indexOf(order);
                let orderProfit = 0;
                let itemsText = order.items.map(item => {
                    const product = products.find(p => p.id === item.id);
                    const cost = product ? product.costPrice : 0;
                    const profit = (item.price - cost) * item.quantity;
                    orderProfit += profit;
                    return `${item.quantity}x ${item.name}`;
                }).join(', ');

                container.innerHTML += `
                <div class="bg-zinc-800 rounded-2xl p-5">
                    <div class="flex justify-between mb-2">
                        <span class="text-sm text-zinc-400">${order.date} - ${order.customer || 'Cliente não informado'}</span>
                        <div class="flex gap-3">
                            <button onclick="printOrder(${originalIndex})" class="flex items-center gap-1 text-[#d4af77] text-xs font-medium">
                                <i class="fa-solid fa-print"></i> IMPRIMIR
                            </button>
                            <button onclick="deleteOrder(${originalIndex})" class="text-red-500 text-xs">Excluir</button>
                        </div>
                    </div>
                    <p class="text-zinc-100">${itemsText}</p>
                    <div class="flex justify-between mt-3">
                        <span class="text-[#d4af77] font-bold">Total Venda: R$ ${order.total},00</span>
                        <span class="font-bold text-green-500">Lucro: R$ ${orderProfit.toFixed(2)}</span>
                    </div>
                </div>`;
            });
        }

        // ====================== RELATÓRIO DETALHADO ======================
        function generateDetailedReport() {
            const filteredOrders = getFilteredOrders();
            const summary = {};

            filteredOrders.forEach(order => {
                order.items.forEach(item => {
                    if (!summary[item.name]) {
                        summary[item.name] = { qty: 0, costTotal: 0, revenue: 0 };
                    }
                    const product = products.find(p => p.id === item.id);
                    const unitCost = product ? product.costPrice : 0;
                    summary[item.name].qty += item.quantity;
                    summary[item.name].costTotal += unitCost * item.quantity;
                    summary[item.name].revenue += item.price * item.quantity;
                });
            });

            const table = document.getElementById('detailed-report-table');
            let html = `
            <thead>
                <tr class="border-b border-zinc-700 bg-zinc-800">
                    <th class="text-left py-4 px-4">Produto</th>
                    <th class="text-center py-4 px-4">Quantidade Vendida</th>
                    <th class="text-right py-4 px-4">Custo Total</th>
                    <th class="text-right py-4 px-4">Lucro Total</th>
                </tr>
            </thead>
            <tbody>`;

            let totalQty = 0, totalCost = 0, totalProfit = 0;

            Object.keys(summary).sort().forEach(name => {
                const data = summary[name];
                const profit = data.revenue - data.costTotal;
                totalQty += data.qty;
                totalCost += data.costTotal;
                totalProfit += profit;

                html += `
                <tr class="border-b border-zinc-700">
                    <td class="py-4 px-4">${name}</td>
                    <td class="py-4 px-4 text-center font-semibold">${data.qty}</td>
                    <td class="py-4 px-4 text-right">R$ ${data.costTotal.toFixed(2)}</td>
                    <td class="py-4 px-4 text-right font-bold text-green-500">R$ ${profit.toFixed(2)}</td>
                </tr>`;
            });

            html += `
            </tbody>
            <tfoot class="bg-zinc-800 font-bold">
                <tr>
                    <td class="py-4 px-4">TOTAL GERAL</td>
                    <td class="py-4 px-4 text-center">${totalQty}</td>
                    <td class="py-4 px-4 text-right">R$ ${totalCost.toFixed(2)}</td>
                    <td class="py-4 px-4 text-right text-green-500">R$ ${totalProfit.toFixed(2)}</td>
                </tr>
            </tfoot>`;

            table.innerHTML = html;
            document.getElementById('detailed-report-modal').classList.remove('hidden');
        }

        function closeDetailedReport() {
            document.getElementById('detailed-report-modal').classList.add('hidden');
        }

        function exportReportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(16);
            doc.text("Relatório Detalhado de Vendas - PEGASUS REPRESENTAÇÕES", 14, 20);

            const table = document.getElementById('detailed-report-table');
            const rows = [];
            const headers = ["Produto", "Quantidade Vendida", "Custo Total (R$)", "Lucro Total (R$)"];

            Array.from(table.rows).forEach(row => {
                const cells = Array.from(row.cells).map(cell => cell.textContent.trim());
                rows.push(cells);
            });

            autoTable(doc, {
                head: [headers],
                body: rows.slice(1),
                startY: 30,
                theme: 'grid',
                styles: { fontSize: 10 },
                headStyles: { fillColor: [212, 175, 119], textColor: [0, 0, 0] }
            });

            doc.save(`relatorio_vendas_${new Date().toISOString().slice(0,10)}.pdf`);
            alert("✅ PDF gerado com sucesso!");
        }

        // ====================== IMPRESSÃO TÉRMICA ======================
        function printOrder(index) {
            const order = orders[index];
            if (!order) return;

            const printArea = document.getElementById('print-area');
            let html = `
            <div style="text-align:center; width:80mm; margin:0 auto;">
                <h2 style="font-size:18px; margin:0;">PEGASUS REPRESENTAÇÕES</h2>
                <p style="font-size:12px; margin:4px 0;">CNPJ: XX.XXX.XXX/XXXX-XX</p>
                <p style="font-size:12px; margin:2px 0;">Pedido #${index + 1}</p>
                <p style="font-size:12px; margin:2px 0;">${order.date}</p>
                <p style="font-size:13px; margin:8px 0 4px 0; font-weight:bold;">Cliente: ${order.customer}</p>
                <hr style="border:0; border-top:1px dashed #000; margin:8px 0;">
            `;

            let total = 0;
            order.items.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `
                <div style="display:flex; justify-content:space-between; font-size:13px; margin:3px 0;">
                    <span>${item.quantity}× ${item.name}</span>
                    <span>R$ ${subtotal},00</span>
                </div>`;
            });

            html += `
                <hr style="border:0; border-top:1px dashed #000; margin:10px 0;">
                <div style="display:flex; justify-content:space-between; font-size:15px; font-weight:bold;">
                    <span>TOTAL</span>
                    <span>R$ ${total},00</span>
                </div>
                <p style="margin-top:20px; font-size:11px; text-align:center;">Obrigado pela preferência!<br>Volte sempre!</p>
                <p style="font-size:10px; margin-top:15px;">Impresso em impressora térmica não-fiscal</p>
            </div>`;

            printArea.innerHTML = html;
            printArea.style.display = 'block';
            window.print();
            printArea.style.display = 'none';
        }

        function deleteOrder(index) {
            if (confirm("Excluir este pedido?")) {
                orders.splice(index, 1);
                localStorage.setItem('pegasus_orders', JSON.stringify(orders));
                renderSales();
            }
        }

        function saveAdminChanges() {
            localStorage.setItem('pegasus_products', JSON.stringify(products));
            alert("✅ Alterações salvas permanentemente!");
            closeAdmin();
            renderProducts(products);
        }

        // ====================== INICIALIZAÇÃO ======================
        window.onload = () => {
            loadCategories();

            const savedProducts = localStorage.getItem('pegasus_products');
            if (savedProducts) products = JSON.parse(savedProducts);

            const savedOrders = localStorage.getItem('pegasus_orders');
            if (savedOrders) orders = JSON.parse(savedOrders);

            renderProducts(products);
            updateCartCount();
        };
    </script>
</body>
