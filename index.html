<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pegasus Representações - Cigarros, Sedas, Piteiras e Fumos Premium">
    
    <meta property="og:title" content="PEGASUS REPRESENTAÇÕES">
    <meta property="og:description" content="Cigarros, Sedas, Piteiras, Fumos e Acessórios">
    <meta property="og:image" content="https://i.ibb.co/3ygz6rym/Mpgt-B-removebg-preview.png">
    <meta property="og:url" content="https://SEUUSUARIO.github.io/pegasus-representacoes">
    <meta property="og:type" content="website">

    <title>PEGASUS REPRESENTAÇÕES</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://i.ibb.co/KxncsGgR/ZMUGd.jpg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        .product-card { height: 100%; display: flex; flex-direction: column; }
        .product-img {
            height: 200px;
            object-fit: contain;
            background: transparent;
            padding: 15px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
            cursor: zoom-in;
        }
        .logo-img { width: 55px; height: 55px; cursor: pointer; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- HEADER, Busca, Produtos, Carrinho, Zoom e Rodapé permanecem iguais -->
    <!-- (código completo omitido por brevidade - copie do seu arquivo anterior) -->

    <!-- ====================== PAINEL ADMIN ====================== -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[500] overflow-auto">
        <div class="max-w-6xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-[#d4af77]">Painel Administrativo</h2>
                <button onclick="closeAdmin()" class="text-4xl text-red-500">✕</button>
            </div>

            <!-- Menu -->
            <div class="grid grid-cols-2 gap-6 mb-10">
                <div onclick="showAdminSection('products-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center">
                    <i class="fa-solid fa-box text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Produtos</p>
                </div>
                <div onclick="showAdminSection('sales-section')" class="bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl cursor-pointer text-center">
                    <i class="fa-solid fa-chart-bar text-5xl text-[#d4af77] mb-4"></i>
                    <p class="text-xl font-semibold">Relatórios de Vendas</p>
                </div>
            </div>

            <!-- Página Produtos -->
            <div id="products-section" class="admin-section active">
                <!-- Cadastrar Novo Produto -->
                <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4">Cadastrar Novo Produto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <input id="new-name" placeholder="Nome" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-img" placeholder="URL da imagem" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-cost" type="number" placeholder="Preço de Custo" class="bg-zinc-800 p-4 rounded-2xl">
                        <input id="new-price" type="number" placeholder="Preço de Venda" class="bg-zinc-800 p-4 rounded-2xl">
                        <select id="new-category" class="bg-zinc-800 p-4 rounded-2xl">
                            <option value="CIGARROS">CIGARROS</option>
                            <option value="SEDAS">SEDAS E PITEIRAS</option>
                            <option value="FUMOS">FUMOS</option>
                            <option value="ACESSORIOS">ACESSÓRIOS</option>
                        </select>
                    </div>
                    <button onclick="addNewProduct()" class="mt-4 w-full bg-green-600 hover:bg-green-500 py-4 rounded-3xl font-semibold">
                        + CADASTRAR PRODUTO
                    </button>
                </div>

                <!-- Gerenciar Produtos -->
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Gerenciar Produtos</h3>
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-zinc-700">
                                <th class="py-3">Produto</th>
                                <th class="py-3">Custo</th>
                                <th class="py-3">Venda</th>
                                <th class="py-3 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <!-- Página Relatórios de Vendas -->
            <div id="sales-section" class="admin-section">
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold">Relatórios de Vendas</h3>
                        <div class="text-right">
                            <p class="text-sm text-zinc-400">Lucro Total Acumulado</p>
                            <p id="total-profit" class="text-3xl font-bold text-green-500">R$ 0,00</p>
                        </div>
                    </div>
                    <div id="sales-list" class="space-y-6"></div>
                </div>
            </div>

            <button onclick="saveAdminChanges()" class="mt-6 w-full py-5 bg-green-600 hover:bg-green-500 rounded-3xl text-lg font-semibold">
                💾 SALVAR TODAS AS ALTERAÇÕES
            </button>
        </div>
    </div>

    <script>
        let products = [ /* seus produtos com costPrice e price */ ];
        let cart = [];
        let currentCategory = 'all';
        let orders = [];

        // Funções da loja (carrinho, produtos, zoom, etc.) permanecem iguais

        function finalizeOrder() {
            if (cart.length === 0) return;
            alert("ATENÇÃO!\n\nOS PREÇOS E ESTOQUE DA LOJA NÃO ESTÃO ATUALIZADOS!\n\nPARA NÃO TER CORTE NO PEDIDO CONFIRME COM O VENDEDOR");
            
            const order = {
                date: new Date().toLocaleString('pt-BR'),
                items: JSON.parse(JSON.stringify(cart)),
                total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0)
            };
            orders.push(order);

            // SALVA PERMANENTEMENTE no localStorage
            localStorage.setItem('pegasus_orders', JSON.stringify(orders));

            // Envia para WhatsApp
            let msg = `🚀 *PEDIDO PEGASUS REPRESENTAÇÕES*\n\n`;
            let total = 0;
            cart.forEach(item => {
                const sub = item.price * item.quantity;
                total += sub;
                msg += `${item.quantity}x ${item.name} → R$ ${sub},00\n`;
            });
            msg += `\n*TOTAL: R$ ${total},00*`;
            window.open(`https://wa.me/5527995065360?text=${encodeURIComponent(msg)}`, '_blank');
            
            cart = [];
            updateCartCount();
            toggleCart();
        }

        function renderSales() {
            const container = document.getElementById('sales-list');
            container.innerHTML = '';
            let totalProfit = 0;

            if (orders.length === 0) {
                container.innerHTML = `<p class="text-zinc-400 text-center py-12">Nenhum pedido registrado ainda.</p>`;
                document.getElementById('total-profit').textContent = 'R$ 0,00';
                return;
            }

            orders.forEach(order => {
                let orderProfit = 0;
                let itemsText = order.items.map(item => {
                    const product = products.find(p => p.id === item.id);
                    const cost = product ? product.costPrice : 0;
                    const profit = (item.price - cost) * item.quantity;
                    orderProfit += profit;
                    return `${item.quantity}x ${item.name}`;
                }).join(', ');

                totalProfit += orderProfit;

                container.innerHTML += `
                <div class="bg-zinc-800 rounded-2xl p-5">
                    <div class="flex justify-between text-sm text-zinc-400 mb-2">
                        <span>${order.date}</span>
                        <span class="font-bold text-green-500">Lucro: R$ ${orderProfit.toFixed(2)}</span>
                    </div>
                    <p class="text-zinc-100">${itemsText}</p>
                    <p class="text-[#d4af77] font-bold">Total Venda: R$ ${order.total},00</p>
                </div>`;
            });

            document.getElementById('total-profit').textContent = `R$ ${totalProfit.toFixed(2)}`;
        }

        function saveAdminChanges() {
            localStorage.setItem('pegasus_products', JSON.stringify(products));
            alert("✅ Alterações salvas permanentemente!");
            closeAdmin();
            renderProducts(products);
        }

        window.onload = () => {
            // Carrega produtos
            const savedProducts = localStorage.getItem('pegasus_products');
            if (savedProducts) products = JSON.parse(savedProducts);

            // Carrega pedidos salvos permanentemente
            const savedOrders = localStorage.getItem('pegasus_orders');
            if (savedOrders) orders = JSON.parse(savedOrders);

            renderProducts(products);
            updateCartCount();
        };
    </script>
</body>
</html>
